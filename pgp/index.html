<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGP Public Key</title>
    <style>
        * {
            user-select: none;
            scroll-behavior: smooth;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }

        button,
        .button {
            color: #333;
            text-decoration: none;
            margin-top: 20px;
            padding: 7px 12px;
            font-size: 1em;
            cursor: pointer;
            border: 1px solid #333;
            background: transparent;
            /* border-radius: 3px; */
            transition-duration: 100ms;
        }

        button:hover,
        .button:hover {
            background-color: #333;
            color: #fff;
        }

        .button-wrapper {
            display: flex;
            gap: 10px;
        }

        small {
            font-size: 0.8em;
            color: #666;
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .center-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            flex: 1;
            margin: 15px;
        }

        .light {
            color: #555;
        }

        .monospace {
            font-family: monospace;
        }

        p {
            font-size: 1.1em;
        }

        .hidden {
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="center">
        <p class="monospace"><br><br>PGP Public Key</p>
        <div class="center-row">
            <div class="button-wrapper">
                <a class="button" onclick="copyKey()">Copy</a>
            </div>
            <div class="button-wrapper">
                <a class="button" href="/pgp/public.asc">Download</a>
            </div>
        </div>
        <p class="monospace hidden"><br>copied.</p>
    </div>
    <script>
        function copyKey() {
            fetch('/pgp/public.asc')
                .then(response => response.text())
                .then(key => {
                    navigator.clipboard.writeText(key).then(() => {
                        const copiedText = document.querySelector('.hidden');
                        copiedText.style.visibility = 'visible';
                        setTimeout(() => {
                            copiedText.style.visibility = 'hidden';
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                    });
                })
                .catch(err => {
                    console.error('Failed to fetch key: ', err);
                });
        }
    </script>
</body>

</html>
